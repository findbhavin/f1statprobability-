# =============================================================================
# docker-compose.yml — local development
#
# Runs backend and frontend as separate hot-reload services.
#
#   docker compose up
#
# Frontend → http://localhost:5173
# Backend  → http://localhost:8000
# API docs → http://localhost:8000/docs
# =============================================================================

version: "3.9"

services:

  # ── Python / FastAPI backend ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Override CMD so we get uvicorn reload for local dev
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload (overrides the COPY in the image)
      - ./F1_Probabilty-main/f1-stat-analysis/backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000

  # ── Node / Vite frontend ───────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./F1_Probabilty-main/f1-stat-analysis/frontend:/app
    environment:
      # Point the frontend at the local backend during dev
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
